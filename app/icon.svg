<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f5ecdc"/>
      <stop offset="100%" stop-color="#e8d9c0"/>
    </linearGradient>
    <linearGradient id="num" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a8895f"/>
      <stop offset="100%" stop-color="#8a6d45"/>
    </linearGradient>
  </defs>

  <!-- Fondo circular beige -->
  <circle cx="32" cy="32" r="30" fill="url(#bg)" stroke="#cbb188" stroke-width="2"/>

  <!-- Aro decorativo interior -->
  <circle cx="32" cy="32" r="24" fill="none" stroke="#d8c4a3" stroke-width="1" stroke-dasharray="2 3"/>

  <!-- Numero 15 -->
  <text x="32" y="33" font-family="Georgia, 'Times New Roman', serif" font-size="30" font-style="italic" font-weight="600" fill="url(#num)" text-anchor="middle" dominant-baseline="central">15</text>

  <!-- Pequeno acento superior -->
  <circle cx="32" cy="10" r="1.6" fill="#b89b6e"/>
</svg>
